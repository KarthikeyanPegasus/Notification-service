apiVersion: v1
kind: Secret
metadata:
  name: {{ include "notification-system.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "notification-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_DSN: {{ .Values.secrets.databaseDsn | quote }}
  REDIS_ADDR: {{ .Values.secrets.redisAddr | quote }}
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  SERVICE_SECRET: {{ .Values.secrets.serviceSecret | quote }}
  GCP_PROJECT_ID: {{ .Values.secrets.gcpProjectId | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  TWILIO_ACCOUNT_SID: {{ .Values.secrets.twilioAccountSid | quote }}
  TWILIO_AUTH_TOKEN: {{ .Values.secrets.twilioAuthToken | quote }}
  FCM_SERVICE_ACCOUNT_JSON: {{ .Values.secrets.fcmServiceAccountJson | quote }}
